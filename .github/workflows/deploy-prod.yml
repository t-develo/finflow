name: Deploy to Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: '手動実行の理由'
        required: true
        default: '手動デプロイ'

env:
  DOTNET_VERSION: '8.0.x'
  ENV_NAME: prod
  RESOURCE_GROUP: finflow-prod-rg
  ARM_TEMPLATE: infra/arm/main.json
  ARM_PARAMS: infra/arm/parameters/prod.parameters.json

jobs:
  test:
    name: テスト実行
    runs-on: ubuntu-latest
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 依存パッケージ復元
        run: dotnet restore

      - name: ビルド
        run: dotnet build --no-restore --configuration Release

      - name: テスト実行
        run: dotnet test --no-build --configuration Release --verbosity normal

  deploy:
    name: Prod 環境デプロイ
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
      url: ${{ steps.get-url.outputs.webapp_url }}
    # production 環境に Required reviewers を設定することで承認ゲートを有効化できます
    # GitHub リポジトリ Settings > Environments > production > Required reviewers

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: アプリケーション パブリッシュ
        run: |
          dotnet publish src/FinFlow.Api \
            --configuration Release \
            --output ./publish \
            --runtime linux-x64 \
            --self-contained false \
            --nologo

      - name: フロントエンドを wwwroot にコピー
        run: cp -r src/frontend/. ./publish/wwwroot/

      - name: ZIP パッケージ作成
        run: (cd ./publish && zip -r ../deploy.zip . -q)

      - name: Azure にログイン
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ARM テンプレートでインフラデプロイ
        id: arm-deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ${{ env.ARM_TEMPLATE }}
          parameters: >
            ${{ env.ARM_PARAMS }}
            sqlAdminPassword=${{ secrets.PROD_SQL_ADMIN_PASSWORD }}
            jwtKey=${{ secrets.PROD_JWT_KEY }}
            smtpHost=${{ secrets.SMTP_HOST }}
            smtpUsername=${{ secrets.SMTP_USERNAME }}
            smtpPassword=${{ secrets.SMTP_PASSWORD }}
            smtpFromAddress=${{ secrets.SMTP_FROM_ADDRESS }}
          failOnStdErr: false

      - name: Web App URL を取得
        id: get-url
        run: |
          WEB_APP_NAME="${{ steps.arm-deploy.outputs.webAppName }}"
          WEB_APP_URL="${{ steps.arm-deploy.outputs.webAppUrl }}"
          echo "webapp_name=${WEB_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "webapp_url=${WEB_APP_URL}" >> "$GITHUB_OUTPUT"

      - name: App Service にアプリをデプロイ
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.get-url.outputs.webapp_name }}
          package: ./deploy.zip

      - name: デプロイ結果をサマリーに出力
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ✅ Prod 環境デプロイ完了

          | 項目 | 値 |
          |------|-----|
          | 環境 | prod |
          | ブランチ | ${{ github.ref_name }} |
          | コミット | ${{ github.sha }} |
          | アクセス URL | ${{ steps.get-url.outputs.webapp_url }} |
          | デプロイ日時 | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          ### ロールバック方法
          前回のコミットに戻す: \`git revert HEAD && git push origin main\`
          EOF

      - name: Azure からログアウト
        if: always()
        run: az logout

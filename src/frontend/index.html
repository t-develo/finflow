<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinFlow - 家計・サブスク管理</title>
  <link rel="stylesheet" href="css/main.css">
  <!-- Chart.js (Sprint 2: ダッシュボードグラフ用) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
          integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="app">
    <!-- Sidebar dim overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>

    <nav id="sidebar" class="sidebar sidebar--hidden">
      <div class="sidebar__logo">
        <span class="sidebar__logo-icon">&#x1F4B0;</span>
        <span class="sidebar__logo-text">FinFlow</span>
      </div>
      <ul class="sidebar__nav">
        <li><a href="/dashboard" class="sidebar__link" data-navigo>ダッシュボード</a></li>
        <li><a href="/expenses" class="sidebar__link" data-navigo>支出管理</a></li>
        <li><a href="/subscriptions" class="sidebar__link" data-navigo>サブスク管理</a></li>
        <li><a href="/categories" class="sidebar__link" data-navigo>カテゴリ</a></li>
        <li><a href="/import" class="sidebar__link" data-navigo>CSV取込</a></li>
      </ul>
      <div class="sidebar__footer">
        <button id="logout-btn" class="sidebar__logout">ログアウト</button>
      </div>
    </nav>

    <main id="main-content" class="main-content">
      <!-- Hamburger menu button (visible on mobile when authenticated) -->
      <button
        id="hamburger-btn"
        class="hamburger-btn"
        type="button"
        aria-label="メニューを開く"
        aria-expanded="false"
        aria-controls="sidebar"
        hidden
      >
        <span class="hamburger-btn__icon" aria-hidden="true">
          <span class="hamburger-btn__bar"></span>
          <span class="hamburger-btn__bar"></span>
          <span class="hamburger-btn__bar"></span>
        </span>
      </button>

      <div id="page-container"></div>
    </main>
  </div>

  <!-- Global toast notifications -->
  <ff-toast></ff-toast>

  <script type="module" src="js/app.js"></script>
</body>
</html>
